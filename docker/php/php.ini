; Laravel local-dev PHP settings (mounted as conf.d/custom.ini).

memory_limit = 512M

; File upload limits (kept in sync with nginx client_max_body_size).
upload_max_filesize = 64M
post_max_size = 64M

max_execution_time = 120

date.timezone = Asia/Bangkok

; Show errors in dev.
display_errors = On

; OPcache enabled but revalidating so code changes are picked up immediately.
opcache.enable = 1
opcache.enable_cli = 0
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
