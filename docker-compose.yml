name: shop-member

services:

  # ─── Workspace (PHP + Composer + Node — สำหรับ dev commands) ─────────────
  workspace:
    build:
      context: ./docker/workspace
      dockerfile: Dockerfile
    container_name: sm-workspace
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    tty: true        # ทำให้ container ไม่ exit อัตโนมัติ
    stdin_open: true
    networks:
      - sm_net

  # ─── PHP-FPM (ใช้ image เดียวกับ workspace แต่รัน php-fpm) ──────────────
  app:
    build:
      context: ./docker/workspace
      dockerfile: Dockerfile
    container_name: sm-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    command: php-fpm
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sm_net

  # ─── Nginx ────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: sm-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - sm_net

  # ─── MariaDB ──────────────────────────────────────────────────────────────
  db:
    image: mariadb:11.4
    container_name: sm-db
    restart: unless-stopped
    ports:
      - "${DB_PORT_EXPOSE:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_DATABASE:-ms}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sm_net

  # ─── phpMyAdmin ───────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: sm-pma
    restart: unless-stopped
    ports:
      - "${PMA_PORT:-8081}:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      UPLOAD_LIMIT: 64M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sm_net

volumes:
  db_data:

networks:
  sm_net:
    driver: bridge
